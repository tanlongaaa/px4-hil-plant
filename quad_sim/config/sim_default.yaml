loop_rate_hz: 250.0
gps_rate_hz: 10.0
state_rate_hz: 50.0
enable_hil_state_quaternion: false
heartbeat_rate_hz: 1.0
ekf_warmup_sec: 3.0
takeoff_throttle_threshold: 0.02
ctrl_alpha: 0.85

ros_debug:
  enabled: false

backend:
  connection_url: "tcpin:0.0.0.0:4560"
  source_system: 142
  source_component: 1
  target_system: 1
  target_component: 1
  actuator_input_type: "motor_outputs"
  actuator_axis_signs: [-1.0, -1.0, -1.0, 1.0]
  control_timeout_sec: 0.5
  log_interval_sec: 1.0

plant:
  # ── Rigid body — iris.sdf ──
  mass: 1.5
  gravity: 9.81
  Jx: 0.029125
  Jy: 0.029125
  Jz: 0.055225

  # ── Active control (du-based mixer) ──
  k_thrust: 7.36
  hover_throttle: 0.50
  motor_roll_moment: 1.30
  motor_pitch_moment: 1.30
  motor_yaw_moment: 0.12
  tau_scale_air: 1.0
  tau_scale_ground: 0.0

  # ── Linear body drag (v9) ──
  # base_linear_drag = bulk isotropic from Iris calibration
  # body_drag_x/y = anisotropic correction ON TOP (v9: lateral > frontal)
  base_linear_drag: 3.5
  body_drag_x: 0.10
  body_drag_y: 0.30
  body_drag_z: 0.1

  # ── Rotor lateral drag (Martin & Salaün 2010) ──
  rotor_drag_coefficient: 0.000175
  omega_hover: 800.0
  omega_scale: 0.5

  # ── Blade flapping (v9 — wind-vane effect) ──
  flapping_coefficient: 5e-05

  # ── Rotor gyroscopic (v9) ──
  I_rotor: 4e-05

  # ── Dynamic inflow — Pitt-Peters (v9) ──
  inflow_tau: 0.05

  # ── Body quadratic drag (v9, used by backend) ──
  body_CdA: 0.12
  rho: 1.225

  # ── Angular damping ──
  angular_damping: 0.3

  # ── Limits ──
  max_tilt_rad: 0.8
  ground_attitude_damping: 0.98

  # ── Legacy ──
  k_tau_roll: 0.02
  k_tau_pitch: 0.02
  k_tau_yaw: 0.008
  idle_throttle_deadzone: 0.05

sensors:
  origin:
    lat_deg: 47.397742
    lon_deg: 8.545594
    alt_m: 488.0
  pressure_msl_hpa: 1013.25
  temperature_c: 20.0
  gyro_dither_rad_s: 0.0005
  mag_dither_gauss: 0.0001
  pressure_dither_hpa: 0.02
  mag_gauss_ned: [0.215, 0.0, 0.427]
  mag_yaw_offset_rad: 0.0
  eph_cm: 80
  epv_cm: 120
  satellites_visible: 12
